<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invila™ | Project Capacity Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            touch-action: manipulation;
            scroll-behavior: smooth; /* Menghaluskan pergerakan scroll */
        }

        .project-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }

        .hero-gradient {
            background: radial-gradient(circle at top right, rgba(37, 99, 235, 0.12), transparent),
                        radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.08), transparent);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #020617; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        .logo-frame {
            background: white;
            padding: 4px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 36px;
            width: 36px;
            overflow: hidden;
        }
    </style>
</head>
<body class="antialiased custom-scrollbar">

    <nav class="sticky top-0 z-50 bg-slate-950/90 backdrop-blur-md border-b border-slate-800/50 px-4 py-2 md:py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="logo-invila.png" alt="Invila Logo" class="h-8 md:h-10 w-auto object-contain" onerror="this.outerHTML='<div class=\'w-8 h-8 md:w-10 md:h-10 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white text-lg md:text-xl\'>I</div>'">
                <div class="flex flex-col leading-tight">
                    <span class="text-sm md:text-xl font-extrabold tracking-tighter text-white uppercase">Invila<span class="text-blue-500">™</span></span>
                    <span class="text-[6px] md:text-[9px] font-black text-slate-500 uppercase tracking-[0.2em]">Water Technology Ecosystem</span>
                </div>
            </div>
        </div>
    </nav>

    <section class="hero-section hero-gradient py-6 md:py-20 px-4 text-center flex flex-col justify-center min-h-[50vh]">
        <div class="max-w-5xl mx-auto w-full">
            <h1 class="text-base md:text-5xl font-black text-white mb-2 md:mb-6 tracking-tight uppercase">Total Akumulasi Kapasitas <br> Pengolahan Terpasang</h1>
            <div class="flex flex-col items-center justify-center mb-4 md:mb-10">
                <div class="flex items-baseline justify-center gap-1">
                    <span class="main-odometer text-4xl md:text-8xl font-black text-white tabular-nums odometer" data-target="79154776">0</span>
                    <span class="text-base md:text-4xl font-bold text-blue-500">m³/Tahun</span>
                </div>
            </div>
            <button id="recalculate-btn" class="mx-auto flex items-center space-x-2 bg-blue-600/10 border border-blue-500/50 text-blue-400 px-4 py-2 rounded-lg text-xs font-black uppercase tracking-widest">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                <span>Mulai Simulasi 10 Detik</span>
            </button>
        </div>
    </section>

    <section class="py-8 px-4 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="project-container"></div>
    </section>

    <footer class="bg-black py-20 px-4 border-t border-slate-900 text-center">
        <p class="text-slate-400 text-sm">Menghasilkan Air Bersih dalam Skala Masif.</p>
    </footer>

    <script>
        const projectData = [
            { name: "Clarifier 6 PDAM Tirtanadi", client: "PDAM Tirtanadi", cap: 43200, lps: 500, year: "2013–2014", type: "IPA" },
            { name: "Clarifier 1 PDAM Tirtanadi", client: "PDAM Tirtanadi", cap: 43200, lps: 500, year: "2013–2014", type: "IPA" },
            { name: "WTP PDAM Tirta Asasta Legong", client: "PDAM", cap: 25920, lps: 300, year: "2016", type: "WTP" },
            { name: "SAPM Gunung Sari Petro Kimia", client: "PT Petro Kimia Gresik", cap: 71971, lps: 833, year: "2016", type: "SAPM" },
            { name: "SAPM KI Wijayakusuma", client: "PT Indisi", cap: 4320, lps: 50, year: "2017–2018", type: "SAPM" },
            { name: "SAPM Patria Maritim Perkasa", client: "PT PMP", cap: 2160, lps: 25, year: "2024", type: "SAPM" }
        ];

        const container = document.getElementById('project-container');
        projectData.forEach(p => {
            const card = document.createElement('div');
            card.className = "project-card p-6 rounded-[1.5rem]";
            card.innerHTML = `
                <p class="text-[9px] font-black text-blue-400 uppercase mb-1">${p.client}</p>
                <h3 class="text-base font-bold text-white mb-4 uppercase">${p.name}</h3>
                <div class="pt-3 border-t border-slate-800">
                    <span class="text-xl font-black text-white odometer" data-target="${p.cap}">0</span>
                    <span class="text-[9px] font-bold text-slate-500">m³/hari</span>
                </div>`;
            container.appendChild(card);
        });

        lucide.createIcons();

        // FUNGSI ANIMASI ODOMETER (10 DETIK)
        const animateOdometer = (el) => {
            const target = parseFloat(el.getAttribute('data-target'));
            const duration = 10000; // Total 10 detik
            const startTime = performance.now();

            const update = (now) => {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                let currentVal;

                if (elapsed < 3000) {
                    // 3 Detik pertama: Berputar acak (random scramble)
                    currentVal = Math.floor(Math.random() * target);
                } else {
                    // Detik 4-10: Melambat ke angka target (Easing out)
                    const easeProgress = (progress - 0.3) / 0.7; // Normalisasi sisa waktu
                    const powerEase = 1 - Math.pow(1 - easeProgress, 3); // Cubic ease out
                    currentVal = target * powerEase;
                }

                el.innerText = Math.floor(currentVal).toLocaleString('id-ID');

                if (progress < 1) {
                    requestAnimationFrame(update);
                } else {
                    el.innerText = target.toLocaleString('id-ID');
                }
            };
            requestAnimationFrame(update);
        };

        // FUNGSI AUTO SCROLL (7 DETIK KE BAWAH, 3 DETIK KE ATAS)
        const startSequence = () => {
            const totalTime = 10000;
            const scrollDownTime = 7000;
            const pageHeight = document.documentElement.scrollHeight - window.innerHeight;

            // Jalankan Odometer
            document.querySelectorAll('.odometer').forEach(odo => animateOdometer(odo));

            // Langkah 1: Scroll ke bawah (Sampai detik ke-7)
            const startTime = performance.now();
            const scrollStep = (now) => {
                const elapsed = now - startTime;
                
                if (elapsed <= scrollDownTime) {
                    // Progress scroll ke bawah
                    const progress = elapsed / scrollDownTime;
                    window.scrollTo(0, pageHeight * progress);
                    requestAnimationFrame(scrollStep);
                } else if (elapsed <= totalTime) {
                    // Langkah 2: Scroll ke atas (Detik 7 sampai 10)
                    const upProgress = (elapsed - scrollDownTime) / (totalTime - scrollDownTime);
                    window.scrollTo(0, pageHeight * (1 - upProgress));
                    requestAnimationFrame(scrollStep);
                }
            };
            requestAnimationFrame(scrollStep);

            // Redirect di detik ke-10
            setTimeout(() => {
                window.location.href = "https://invilawatertreatment-blip.github.io/McKinsey-Global-/";
            }, totalTime);
        };

        // Event Listener
        document.getElementById('recalculate-btn').addEventListener('click', startSequence);

        // Jalankan otomatis saat load (opsional)
        // window.addEventListener('load', startSequence);
    </script>
</body>
</html>
